    - high-voltage
    - real-time
    - wireless
89. **A powerful system with excellent performance is ______.**
    - high-performance
    - low-noise
    - wireless
    - short-circuit
90. **A low price product is ______.**
    - low-cost
    - high-voltage
    - real-time
    - wireless
`;

        // Parser and Initializer
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function parseAndRender() {
            const allQuestions = [];
            const lines = rawData.split('\n');
            let currentQ = null;
            let currentSection = "";

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                if (trimmed.startsWith('##')) {
                    // Clean up section names for a cleaner display tag
                    currentSection = trimmed.replace(/^##\s*/, '').replace(/\(Additional\)/gi, '').replace(/Section/gi, '').trim();
                } else if (/^\d+\.\s*\*\*/.test(trimmed) || /^\d+\.\s/.test(trimmed)) {
                    if (currentQ && currentQ.options.length > 0) allQuestions.push(currentQ);
                    
                    let qText = trimmed.replace(/^\d+\.\s*\**/, '').replace(/\**$/, '').trim();
                    currentQ = {
                        category: currentSection,
                        question: qText,
                        options: [],
                        correctIndex: 0 
                    };
                } else if (trimmed.startsWith('-')) {
                    if (currentQ) {
                        currentQ.options.push(trimmed.replace(/^-/, '').trim());
                    }
                }
            });
            if (currentQ && currentQ.options.length > 0) allQuestions.push(currentQ);

            // 1. Shuffle all pooled questions
            shuffleArray(allQuestions);
            
            // 2. Select exactly 40 questions without duplication
            const selectedQuestions = allQuestions.slice(0, 40);

            selectedQuestions.forEach((item, index) => {
                item.id = index;
                
                // The first option in the raw data is always the correct one
                const correctText = item.options[0];
                
                // 3. Shuffle options for this specific question
                shuffleArray(item.options);
                
                // Find new index of the correct answer after shuffling
                item.correctIndex = item.options.indexOf(correctText);
                
                // Assign standard Letters A, B, C, D to the shuffled choices
                item.optionsWithLetters = item.options.map((opt, i) => {
                    return `${String.fromCharCode(65 + i)}. ${opt}`;
                });
            });

            // Render HTML
            const main = document.getElementById('quiz-main');
            let html = '<h2 class="section-title">40-Question Random Challenge</h2>';

            selectedQuestions.forEach(item => {
                html += `
                    <div class="card" id="q-${item.id}">
                        <div style="font-size: 0.7em; font-weight: bold; color: var(--primary-dark); text-transform: uppercase; margin-bottom: 6px; opacity: 0.8;">
                            [ ${item.category} ]
                        </div>
                        <h3 class="card-title">${item.id + 1}. ${item.question}</h3>
                        <div class="options-container">
                            ${item.optionsWithLetters.map((opt, oIdx) => `
                                <button class="option-btn" onclick="checkAnswer(${item.id}, ${oIdx}, this, ${item.correctIndex})">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            main.innerHTML = html;
        }

        // Action Logic
        function checkAnswer(qId, selectedIdx, btn, correctIdx) {
            const card = document.getElementById(`q-${qId}`);
            const buttons = card.querySelectorAll('.option-btn');

            buttons.forEach((b, i) => {
                b.disabled = true; // Disable all attempts (Single Attempt Rule)
                if (i === correctIdx) {
                    b.classList.add('correct');
                } else if (i === selectedIdx) {
                    b.classList.add('wrong');
                }
            });
        }

        // Initialize on load
        window.onload = parseAndRender;

    </script>
